<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>12s</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --table:#143642; --table-2:#1d4d57; --paper:#f5efe2; --ink:#1a1410;
    --ink-soft:#9fb0b4; --glow:#5fd9b0; --wild-a:#f2c14e; --wild-b:#e8833a;
    --troy:#e0992b; --kaara:#d65d7a;
    --font-display:"Bricolage Grotesque", system-ui, sans-serif;
    --font-body:"Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-body); color: var(--paper);
    background: radial-gradient(120% 80% at 50% -10%, var(--table-2) 0%, var(--table) 55%, #0e272f 100%);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    text-align: center; overflow: hidden;
  }
  .splash { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 24px; }

  /* fanned cards behind the wordmark */
  .fan { position: relative; height: 132px; width: 240px; margin-bottom: 18px; }
  .fan .card {
    position: absolute; bottom: 0; left: 50%;
    width: 78px; height: 110px; margin-left: -39px;
    border-radius: 12px; background: var(--paper); color: var(--ink);
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 800; font-size: 40px;
    transform-origin: bottom center;
    animation: dealIn .6s cubic-bezier(.2,.8,.2,1) backwards;
  }
  .fan .c1 { transform: rotate(-18deg) translateX(-58px); animation-delay: .05s; }
  .fan .c2 { transform: rotate(-8deg)  translateX(-26px); animation-delay: .12s; }
  .fan .c3 { transform: rotate(2deg)   translateX(6px);   animation-delay: .19s; z-index: 2; }
  .fan .c4 { transform: rotate(12deg)  translateX(40px);  animation-delay: .26s; }
  .fan .wild {
    color: #4a2d05;
    background: linear-gradient(135deg, var(--wild-a), var(--wild-b));
  }
  .fan .back {
    color: transparent;
    background-color:#1c3f48;
    background-image: url("12s.png"), repeating-linear-gradient(45deg,#234b56 0 8px,#1c3f48 8px 16px);
    background-size: cover, auto; background-position: center; background-repeat: no-repeat;
  }
  @keyframes dealIn { from { opacity: 0; transform: translateY(40px) rotate(0deg); } }

  h1 {
    font-family: var(--font-display); font-weight: 800; font-size: 92px;
    letter-spacing: -.04em; margin: 0; line-height: .9;
    background: linear-gradient(180deg, #ffffff, #cfe9df);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: rise .6s ease .3s backwards;
  }
  .tag {
    color: var(--ink-soft); font-size: 13px; letter-spacing: .34em;
    text-transform: uppercase; margin: 8px 0 2px;
    animation: rise .6s ease .4s backwards;
  }
  .sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 30px; animation: rise .6s ease .45s backwards; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } }

  .play {
    font-family: var(--font-display); font-weight: 700; font-size: 18px;
    color: #06231a; background: var(--glow); border: none;
    padding: 15px 54px; border-radius: 999px; cursor: pointer;
    text-decoration: none; display: inline-block;
    box-shadow: 0 8px 24px rgba(95,217,176,.25);
    transition: transform .1s ease, filter .12s ease;
    animation: rise .6s ease .55s backwards;
  }
  .play:hover { filter: brightness(1.06); transform: translateY(-2px); }
  .play:active { transform: translateY(0); }

  .foot { margin-top: 22px; color: var(--ink-soft); font-size: 11px; letter-spacing: .12em; animation: rise .6s ease .65s backwards; }

  @media (max-width: 480px) {
    h1 { font-size: 68px; }
    .fan { transform: scale(.85); }
  }
  @media (prefers-reduced-motion: reduce) {
    .fan .card, h1, .tag, .sub, .play, .foot { animation: none; }
  }
</style>
</head>
<body>
  <main class="splash">
    <div class="fan" aria-hidden="true">
      <div class="card c1">1</div>
      <div class="card wild c2">W</div>
      <div class="card back c3"></div>
      <div class="card c4">12</div>
    </div>
    <h1>12s</h1>
    <div class="tag">2&ndash;4 player card game</div>
    <p class="sub">Build the piles. Empty your stock. Win.</p>
    <a class="play" href="game.html">Play</a>
    <div class="foot">TAP PLAY TO BEGIN</div>
  </main>
</body>
</html>
